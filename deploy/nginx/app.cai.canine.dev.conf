# dgx1 TLS edge vhost — app.cai.canine.dev → canine-wrx1 :8090 (the SAME cai-web service as
# api.cai.canine.dev; this is a third hostname on the existing backend, not a new service).
#
# Why this hostname exists. cai.canine.dev serves the MARKETING site (imprint CMS), so the app's own
# interactive pages are unreachable there: cai.canine.dev/calculator returns "Page not found" even
# though Cai.Web renders it, because that host never reaches the app. Only /api/* does. The tools that
# make the standard checkable — the calculator, and the verifier that reproduces a headline and checks
# an Ed25519 delivery signature — were therefore deployed but effectively unlinkable, which defeats
# the point of shipping them.
#
# app.cai.canine.dev is the same split watchdog already uses (watchdog.canine.dev = marketing,
# app.watchdog.canine.dev = the app), so the convention is not new. The marketing pages should link
# out to app.cai.canine.dev/verify and /calculator rather than trying to host the tools themselves.
#
# Install: /etc/nginx/sites-available/app.cai.canine.dev + symlink into sites-enabled.
# Cert (webroot, same as the other cai vhosts):
#   sudo certbot certonly --webroot -w /var/www/html -d app.cai.canine.dev
# DNS already resolves (wildcard *.canine.dev → 5.103.135.44) — no DNS change needed.
server {
    listen 80;
    listen [::]:80;
    server_name app.cai.canine.dev;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name app.cai.canine.dev;
    ssl_certificate /etc/letsencrypt/live/app.cai.canine.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.cai.canine.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    # The verifier takes a pasted delivery package (full evidence JSON) as a form post, so it needs the
    # same roomier body limit as the API vhost rather than the default 1m.
    client_max_body_size 16m;
    location / {
        proxy_pass http://192.168.1.10:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 120;
    }
}
