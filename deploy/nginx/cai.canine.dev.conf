# ⚠ STALE — this file no longer describes what cai.canine.dev actually serves.
#
# It says the apex host proxies everything to the Cai.Web app on :8090. Production disagrees:
# cai.canine.dev/calculator and /spec return imprint-rendered marketing pages (and /calculator returns
# "Page not found"), while /api/rubrics and /api/verify-delivery reach the app normally. The apex was
# migrated onto the imprint CMS — as watchdog.canine.dev was — and this reference copy was never
# updated, which is how two app pages could be deployed for a week without being reachable at the
# hostname everything links to.
#
# The live apex config is whatever imprint's deployment installs; it is NOT reproduced here, because
# guessing at it would leave a second wrong file in the repo. What IS true and checked:
#   • the app is reachable at api.cai.canine.dev and app.cai.canine.dev (see those files)
#   • /api/* reaches the app from the apex
# Anyone touching the apex vhost should replace this file with the real one and delete this notice.

server {
    listen 80;
    listen [::]:80;
    server_name cai.canine.dev;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name cai.canine.dev;
    ssl_certificate /etc/letsencrypt/live/cai.canine.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cai.canine.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    client_max_body_size 4m;
    location / {
        proxy_pass http://192.168.1.10:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 120;
    }
}
