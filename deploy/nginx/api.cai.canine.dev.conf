# dgx1 TLS edge vhost — api.cai.canine.dev → canine-wrx1 :8090 (the SAME cai-web service as
# cai.canine.dev; the registry lives inside Cai.Web under /api/registry, so api.cai is a second
# hostname on the existing backend, not a new service).
# Install: /etc/nginx/sites-available/api.cai.canine.dev + symlink into sites-enabled.
# Cert (webroot, same as cai.canine.dev):
#   sudo certbot certonly --webroot -w /var/www/html -d api.cai.canine.dev
# DNS already resolves (wildcard *.canine.dev → 5.103.135.44) — no DNS change needed.
server {
    listen 80;
    listen [::]:80;
    server_name api.cai.canine.dev;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.cai.canine.dev;
    ssl_certificate /etc/letsencrypt/live/api.cai.canine.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.cai.canine.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    # Signed delivery packages carry full evidence JSON — allow a roomier body than the UI vhost.
    client_max_body_size 16m;
    location / {
        proxy_pass http://192.168.1.10:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 120;
    }
}
