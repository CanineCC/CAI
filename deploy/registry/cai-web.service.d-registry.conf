# systemd drop-in for cai-web.service — registry persistence OUTSIDE the deploy-swapped app dir.
# Install as /etc/systemd/system/cai-web.service.d/registry.conf  (then: systemctl daemon-reload;
# takes effect on the next service restart — i.e. the next deploy).
#
# WHY: the cai deploy swaps /home/jimmy/apps/cai-web/app wholesale (rm -rf + mv). RegistryOptions
# defaults DbPath to <content-root>/data/registry.db, which that swap would DELETE. Point the store
# (and the trusted-keys file) at a stable sibling dir instead.
#
# SECRETS: Registry__Principals__* (bearer tokens) do NOT belong here (drop-ins are world-readable)
# — they live in the 0600 env file below, loaded if present ("-" = optional, so the service still
# boots before the registry is configured).
#
# ROLLBACK: sudo rm -r /etc/systemd/system/cai-web.service.d && sudo systemctl daemon-reload
[Service]
Environment=Registry__DbPath=/home/jimmy/apps/cai-web/registry-data/registry.db
Environment=Registry__KeysPath=/home/jimmy/apps/cai-web/registry-data/trusted-keys.json
EnvironmentFile=-/home/jimmy/.config/cai/registry.env
